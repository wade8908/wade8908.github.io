<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#1c1a17" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="1200" height="1200" fill="#f7f6f2"/>
  <rect width="1200" height="1200" fill="url(#dots)"/>

  <!-- oversized decorative quote -->
  <text x="1180" y="500" text-anchor="end"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="620" fill="#b05a38" opacity="0.16">&#8220;</text>

  <!-- eyebrow -->
  <text x="112" y="168" font-family="'Helvetica Neue','Apple SD Gothic Neo',sans-serif"
        font-size="29" letter-spacing="6" fill="#8a857c">SEO JUNWON &#183; WADE</text>

  <!-- headline -->
  <text x="108" y="540" font-family="Georgia,'AppleMyungjo',serif" font-weight="600"
        font-size="128" fill="#1c1a17" letter-spacing="-2">브랜드의 <tspan fill="#b05a38">표현</tspan>을</text>
  <text x="108" y="690" font-family="Georgia,'AppleMyungjo',serif" font-weight="600"
        font-size="128" fill="#1c1a17" letter-spacing="-2">돕습니다.</text>

  <!-- subtitle -->
  <text x="112" y="775" font-family="'Helvetica Neue','Apple SD Gothic Neo',sans-serif"
        font-size="37" fill="#8a857c" letter-spacing="0.3">콘텐츠 마케팅 &#183; 커뮤니티 빌딩 &#183; 카피라이팅</text>

  <!-- divider -->
  <line x1="112" y1="1000" x2="1088" y2="1000" stroke="#e4e0d8" stroke-width="1.5"/>

  <!-- footer left: books -->
  <text x="112" y="1058" font-family="'Helvetica Neue','Apple SD Gothic Neo',sans-serif"
        font-size="29" fill="#8a857c">베스트셀러 「훅, 끌어당기는 콘텐츠 마케팅」 「모임의 기술」 저자</text>

  <!-- footer left: url -->
  <text x="112" y="1108" font-family="'Helvetica Neue','Apple SD Gothic Neo',sans-serif"
        font-size="29" fill="#b05a38" font-weight="600">wade8908.github.io</text>
</svg>
